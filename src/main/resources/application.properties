spring.application.name=demo

# 🚨 Railway 환경에 꼭 필요한 포트 자동 지정 설정 (내 컴퓨터에선 8080, Railway에선 자동 변신)
server.port=${PORT:8080}

# 🎯 Railway가 제공하는 MySQL 환경 변수 자동 바인딩
# (Railway 대시보드에서 제공하는 실제 환경 변수명으로 매핑해 줍니다)
spring.datasource.url=${MYSQL_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/my_api_db?serverTimezone=Asia/Seoul}}
spring.datasource.username=${MYSQLUSER:${SPRING_DATASOURCE_USERNAME:root}}
spring.datasource.password=${MYSQLPASSWORD:${SPRING_DATASOURCE_PASSWORD:root}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
